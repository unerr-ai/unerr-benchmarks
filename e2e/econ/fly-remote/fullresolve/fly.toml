# SINGLE-ARM econ full-resolve runner — minimal app config.
#
# Used ONLY by run.sh's `flyctl deploy --build-only --config this-file` to give
# flyctl the app name without it trying to rebuild config from (nonexistent)
# machines. The actual machine is launched by `flyctl machine run` with explicit
# flags (volume, vm size, env) — NOT from this file. No [http_service]: this is a
# one-shot batch job, not a server. No [mounts]/[[vm]] here on purpose (they are
# passed as run.sh flags instead).
app = "unerr-bench-econ-fullresolve"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
