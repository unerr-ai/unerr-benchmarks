# Batch A/B job — no HTTP service. Built by fly's remote builder; run as a
# one-shot machine by run.sh. App name is a placeholder run.sh can override.
# set to your fly app name (or pass --app)
app = "swebench-agent-codex"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# No [http_service]/[[services]] — this image is a job, not a server.
